<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIYMEK | Crafted To Conquer</title>
<link href="https://fonts.googleapis.com/css2?family=Quincy&family=Afrah:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#d4af37;
  --bg:#000;
  --card-bg:#111;
  --white:#fff;
}

body { margin:0; font-family:'Afrah',sans-serif; background:var(--bg); color:var(--white); }

header { text-align:center; padding:80px 20px; }
header h1 { font-family:'Quincy', serif; font-size:60px; color:var(--gold); margin:0; }
header p { font-size:20px; margin:10px 0; }
header .btn { display:inline-block; margin-top:20px; padding:12px 25px; background:var(--gold); color:black; text-decoration:none; font-weight:bold; border-radius:5px; font-family:'Quincy', serif; }
header .btn:hover { opacity:0.85; }

.section { padding:50px 20px; text-align:center; }
.category-title { letter-spacing:5px; color:var(--gold); border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:30px; text-transform:uppercase; }
.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.card { background:var(--card-bg); border-radius:8px; padding:15px; width:250px; text-align:center; }
.card img { width:100%; height:300px; object-fit:cover; border-radius:5px; margin-bottom:10px; }
.product-name { font-weight:600; margin:5px 0; }
.price { color:var(--gold); margin-bottom:10px; }
.buy-now { display:block; width:100%; background:var(--gold); color:black; border:none; padding:10px; font-weight:bold; text-transform:uppercase; cursor:pointer; border-radius:5px; }
.buy-now:hover { background:white; }

.contact-info a { color:var(--gold); text-decoration:none; }
footer { text-align:center; padding:30px; background:#111; margin-top:40px; }

@media(max-width:600px){ .card{width:90%;} }
</style>
</head>
<body>

<header>
  <h1>GIYMEK</h1>
  <p>Crafted To Conquer</p>
  <a href="#collections" class="btn">Shop Now</a>
</header>

<section id="collections" class="section">
  <h2 class="category-title">Clothing</h2>
  <div class="grid" id="clothing-grid"></div>

  <h2 class="category-title">Organic</h2>
  <div class="grid" id="organic-grid"></div>

  <h2 class="category-title">Perfume</h2>
  <div class="grid" id="perfume-grid"></div>
</section>

<section class="section contact-info">
  <h2>Contact Us</h2>
  <p>Email: <a href="mailto:giymekfashion@gmail.com">giymekfashion@gmail.com</a></p>
  <p>WhatsApp: <a href="https://wa.me/8801970141884" target="_blank">01970141884</a></p>
</section>

<footer>
  <p>© 2026 GIYMEK | Crafted To Conquer</p>
</footer>

<script>
// Product data - Replace 'img' with your uploaded images later
const products = [
  // Clothing
  {category:'Clothing', name:'Drop Shoulder', price:'৳ 500', img:'https://via.placeholder.com/250x300?text=Drop+Shoulder'},
  {category:'Clothing', name:'Regular Fit', price:'৳ 450', img:'https://via.placeholder.com/250x300?text=Regular+Fit'},
  {category:'Clothing', name:'Sublimation Jersey', price:'৳ 550', img:'https://via.placeholder.com/250x300?text=Sublimation+Jersey'},

  // Organic
  {category:'Organic', name:'Food', price:'৳ 300', img:'https://via.placeholder.com/250x300?text=Food'},
  {category:'Organic', name:'Skin Care', price:'৳ 600', img:'https://via.placeholder.com/250x300?text=Skin+Care'},

  // Perfume
  {category:'Perfume', name:'Attar', price:'৳ 700', img:'https://via.placeholder.com/250x300?text=Attar'},
  {category:'Perfume', name:'Decent', price:'৳ 800', img:'https://via.placeholder.com/250x300?text=Decent'},
  {category:'Perfume', name:'Giymek Special', price:'৳ 1200', img:'https://via.placeholder.com/250x300?text=Giymek+Special'},
  {category:'Perfume', name:'Other Brands', price:'৳ 900', img:'https://via.placeholder.com/250x300?text=Other+Brands'}
];

// Render products in their categories
function renderGrid(categoryId, catName){
  const grid = document.getElementById(categoryId);
  products.filter(p=>p.category===catName).forEach(p=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}">
      <p class="product-name">${p.name}</p>
      <p class="price">${p.price}</p>
      <button class="buy-now" onclick="buyNow('${p.name}','${p.price}')">Buy Now</button>
    `;
    grid.appendChild(card);
  });
}

// Simple WhatsApp Buy Now
function buyNow(name, price){
  const message = `Assalamu Alaikum, I want to order:\nProduct: ${name}\nPrice: ${price}`;
  window.open(`https://wa.me/8801970141884?text=${encodeURIComponent(message)}`, '_blank');
}

// Render all categories
renderGrid('clothing-grid','Clothing');
renderGrid('organic-grid','Organic');
renderGrid('perfume-grid','Perfume');
</script>

</body>
</html>
